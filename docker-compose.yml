version: '3.8'

services:
  # CPU版本
  sam3-an-cpu:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: python:3.10-slim
        DEVICE_TYPE: cpu
    container_name: sam3-an-cpu
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    environment:
      - DEVICE_TYPE=cpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # GPU版本（需要nvidia-docker2支持）
  sam3-an-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: sam3-an-gpu
    ports:
      - "5002:5001"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - DEVICE_TYPE=gpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - gpu

volumes:
  data:
  uploads:
  exports:
